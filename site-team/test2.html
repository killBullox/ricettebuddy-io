<!doctype html><html lang="it"><head><meta charset="utf-8"><title>Diagnosi login</title>
<style>body{font-family:system-ui,Arial;padding:20px;font-size:16px;line-height:1.7;max-width:640px;margin:auto}
input,button{font-size:16px;padding:10px;margin:4px 0;width:100%;box-sizing:border-box}
button{background:#C42B6E;color:#fff;border:none;border-radius:8px;cursor:pointer}
#log{background:#f5f0ea;border-radius:8px;padding:12px;margin-top:14px;white-space:pre-wrap}
b{color:#C42B6E}</style></head>
<body>
<h2>Diagnosi login area team</h2>
<input id="email" placeholder="Email" value="manuela.manzo@beetit.it">
<input id="pwd" type="password" placeholder="Password">
<button id="go">Prova login</button>
<div id="log">In attesa...</div>
<script src="supabase.js"></script>
<script>
var L=document.getElementById('log'); function log(t){ L.innerHTML += '\n'+t; }
L.textContent='';
log(window.supabase ? '[1] libreria OK' : '[1] libreria MANCANTE');
var sb;
try{ sb = window.supabase.createClient('https://zffcpwtijxbbshrpsxqq.supabase.co','sb_publishable_PaKU0cAnn701i04XkFl-Eg_Xt7YUXLR'); log('[2] client creato OK'); }
catch(e){ log('[2] ERRORE client: '+e.message); }
document.getElementById('go').onclick = async function(){
  log('\n--- tentativo login ---');
  try{
    var r = await sb.auth.signInWithPassword({ email:document.getElementById('email').value.trim(), password:document.getElementById('pwd').value });
    if(r.error){ log('[3] login FALLITO: '+r.error.message); return; }
    log('[3] login OK, utente: '+r.data.user.email);
    var p = await sb.from('profiles').select('role,full_name').eq('id', r.data.user.id).single();
    if(p.error){ log('[4] profilo ERRORE: '+p.error.message); return; }
    log('[4] profilo OK, ruolo: '+p.data.role);
    var rec = await sb.from('recipes').select('id,title').is('user_id',null).limit(5);
    if(rec.error){ log('[5] ricette ERRORE: '+rec.error.message); return; }
    log('[5] ricette OK, lette: '+rec.data.length+' (prima: '+(rec.data[0]?rec.data[0].title:'-')+')');
    log('\n>>> TUTTO FUNZIONA. Il problema e solo nella pagina index.');
  }catch(e){ log('ECCEZIONE: '+(e&&e.message?e.message:e)); }
};
</script>
</body></html>
