name: ricettebuddy
description: RicetteBuddy — ricette, piano pasti, spesa e Chef creativo (iOS + Android).
publish_to: "none"
version: 0.2.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Backend / auth / storage
  supabase_flutter: ^2.5.6

  # Stato
  flutter_riverpod: ^2.5.1

  # Utilità
  intl: any
  cached_network_image: ^3.3.1
  http: ^1.2.0
  url_launcher: ^6.3.0
  video_player: ^2.9.2
  chewie: ^1.8.5
  fl_chart: ^0.69.0
  flutter_svg: ^2.0.10
  flutter_slidable: ^3.1.1
  shared_preferences: ^2.2.3
  # F1 — import dai social col tasto Condividi (Share Extension iOS / Intent Android)
  receive_sharing_intent: ^1.8.0
  # Estrazione contenuti social SUL DISPOSITIVO (connessione/login dell'utente):
  # webview headless per leggere la didascalia di IG/FB/Pinterest senza bot-gate.
  flutter_inappwebview: ^6.1.5
  # F3 — scansione dispensa: foto della confezione/alimento -> AI vision
  image_picker: ^1.1.2

  # --- Feature che aggiungeremo (lasciate qui come promemoria) ---
  # receive_sharing_intent: ^1.8.0        # F1 import dai social (Share Extension)
  # image_picker: ^1.1.2                  # F3 scatto/galleria
  # google_mlkit_text_recognition: ^0.13.0  # F3 OCR
  # drift: ^2.18.0                        # cache offline-first

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  generate: true   # abilita la generazione l10n (F8) da lib/l10n/*.arb
  assets:
    - assets/images/
    - assets/branding/
