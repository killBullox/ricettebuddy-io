# Build iOS di Beet-It su Mac cloud (Codemagic) e pubblicazione su TestFlight.
# Il progetto Flutter è nella sottocartella app/.
#
# PRIMA DI LANCIARE, su Codemagic vanno collegati (una volta):
#  - Integrazione "App Store Connect API key" (Team settings) -> nome sotto.
#  - Il bundle id io.beetit.recipes registrato su App Store Connect.
# E va impostata la variabile API_BASE (URL pubblico del backend) nel gruppo env.

workflows:
  ios-testflight:
    name: Beet-It iOS → TestFlight
    instance_type: mac_mini_m2
    max_build_duration: 60
    integrations:
      app_store_connect: CodemagicASC   # <-- nome della tua integrazione ASC API key
    environment:
      groups:
        - beetit                         # gruppo con API_BASE (URL backend pubblico)
      flutter: stable
      xcode: latest
      cocoapods: default
      ios_signing:
        distribution_type: app_store
        bundle_identifier: io.beetit.recipes
      vars:
        BUNDLE_ID: "io.beetit.recipes"
        APP_STORE_APPLE_ID: 0000000000   # <-- Apple ID numerico dell'app (da App Store Connect)
    scripts:
      - name: Flutter pub get
        working_directory: app
        script: flutter pub get
      - name: Set up code signing
        script: xcode-project use-profiles
      - name: Build IPA
        working_directory: app
        script: |
          flutter build ipa --release \
            --dart-define=API_BASE=$API_BASE \
            --export-options-plist=/Users/builder/export_options.plist
    artifacts:
      - app/build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        # niente review automatica: resta in TestFlight per il test interno
